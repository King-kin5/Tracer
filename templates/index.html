<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Form</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            color: #00ff00;
        }
        
        /* Forms Container */
        .container {
            width: 100%;
            max-width: 500px;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        form {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #00ff00;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background-color: #333;
            color: #00ff00;
            border: 1px solid #555;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #00ff00;
            color: #121212;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #00cc00;
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h2 {
                font-size: 1.3rem;
            }

            input, button {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <form action="/username_tracker" method="POST">
            <h2>Username Tracker</h2>
            <label for="username">Enter Username</label>
            <input type="text" id="username" name="username" placeholder="Username" required>
            <button type="submit">Track Username</button>
        </form>

        <form action="/phone_tracker" method="POST">
            <h2>Phone Tracker</h2>
            <label for="phone">Enter Phone Number</label>
            <input type="text" id="phone" name="phone" placeholder="Phone Number" required>
            <button type="submit">Track Phone</button>
        </form>
    </div>
</body>
</html>
